name: Daily iGaming Scrape

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00 = 台灣時間 09:00
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml deep-translator

      - name: Run scraper
        run: python scraper.py

      - name: Rebuild HTML
        run: python build_ci.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date '+%Y-%m-%d')"
          git push
