<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card2: #222537;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8eaf6;
    --muted: #8b92b8;
    --border: #2e3150;
    --tag-vendor: #1e3a5f;
    --tag-trend: #1a3d2b;
    --tag-reg: #3d1a1a;
    --tag-tech: #2d1a3d;
    --star: #f5c518;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'PingFang TC', sans-serif; min-height: 100vh; }

  /* Header */
  header { background: linear-gradient(135deg, #1a1d2e 0%, #12142a 100%); border-bottom: 1px solid var(--border); padding: 20px 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--accent2); }
  .header-stats { display: flex; gap: 20px; margin-left: auto; font-size: 0.82rem; color: var(--muted); }
  .header-stats b { color: var(--text); }

  /* Controls */
  .controls { max-width: 1400px; margin: 20px auto; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  input[type=text], select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 9px 14px; border-radius: 8px; font-size: 0.9rem; outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[type=text] { flex: 1; min-width: 200px; }
  select { cursor: pointer; }
  .btn { padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c73ff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }

  /* Date Nav */
  .date-nav { max-width: 1400px; margin: 0 auto 16px; padding: 0 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .date-nav-label { font-size: 0.82rem; color: var(--muted); margin-right: 4px; }
  .date-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .date-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .date-btn.active { background: var(--accent2); border-color: var(--accent2); color: #000; font-weight: 700; }
  .date-btn.all { border-color: var(--accent); color: var(--accent); }
  .date-btn.all.active { background: var(--accent); color: #fff; }

  /* Summary Bar */
  .summary-bar { max-width: 1400px; margin: 0 auto 20px; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .summary-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 0.82rem; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }
  .summary-chip b { font-size: 1.3rem; color: var(--text); }
  .summary-chip.hl b { color: var(--accent2); }

  /* Grid */
  .grid { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.2s, transform 0.15s; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-date { font-size: 0.78rem; color: var(--muted); }
  .stars { color: var(--star); font-size: 0.9rem; letter-spacing: 1px; }
  .category-tag { display: inline-block; font-size: 0.72rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .cat-vendor { background: var(--tag-vendor); color: #5ba3f5; }
  .cat-trend { background: var(--tag-trend); color: #4ecb87; }
  .cat-reg { background: var(--tag-reg); color: #f5706e; }
  .cat-tech { background: var(--tag-tech); color: #c084fc; }
  .cat-event { background: #2d2a18; color: #f0c040; }
  .cat-default { background: #222537; color: var(--muted); }
  .vendor-name { font-size: 0.95rem; font-weight: 700; color: var(--accent2); }
  .game-name { font-size: 0.88rem; color: var(--text); font-weight: 600; }
  .summary { font-size: 0.84rem; color: var(--muted); line-height: 1.6; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 4px; }
  .source-link { font-size: 0.78rem; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
  .source-link:hover { text-decoration: underline; }
  .source-icon { font-size: 0.75rem; }

  /* Empty */
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1rem; }

  /* Importance filter */
  .star-filter { display: flex; gap: 6px; align-items: center; }
  .star-filter span { font-size: 0.82rem; color: var(--muted); }

  /* Divider label */
  .date-group-label { grid-column: 1/-1; font-size: 0.85rem; color: var(--muted); padding: 8px 2px 4px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .date-group-label b { color: var(--accent2); font-size: 1rem; }
  .date-group-label .count { background: var(--card2); border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; }
</style>

function catClass(cat) {
  if (cat.includes('廠商')) return 'cat-vendor';
  if (cat.includes('趨勢')) return 'cat-trend';
  if (cat.includes('法規') || cat.includes('菲律賓')) return 'cat-reg';
  if (cat.includes('科技')) return 'cat-tech';
  if (cat.includes('大事')) return 'cat-event';
  return 'cat-default';
}

function starsHTML(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function hostname(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

let selectedDate = 'all';

function allDates() {
  const s = new Set(raw.map(r => r.date));
  return [...s].sort().reverse();
}

function buildDateNav() {
  const nav = document.querySelector('.date-nav');
  const dates = allDates();
  dates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-btn';
    btn.dataset.date = d;
    btn.textContent = d;
    btn.onclick = () => { selectedDate = d; render(); updateDateNav(); };
    nav.appendChild(btn);
  });
}

function updateDateNav() {
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.date === selectedDate);
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const minStars = parseInt(document.getElementById('starFilter').value);
  const sort = document.getElementById('sortBy').value;

  let data = raw.filter(r => {
    if (selectedDate !== 'all' && r.date !== selectedDate) return false;
    if (cat && r.cat !== cat) return false;
    if (r.stars < minStars) return false;
    if (q && !`${r.vendor} ${r.game} ${r.summary} ${r.cat}`.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sort === 'date-asc') data.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'date-desc') data.sort((a,b) => b.date.localeCompare(a.date));
  else if (sort === 'star-desc') data.sort((a,b) => b.stars - a.stars || b.date.localeCompare(a.date));

  return data;
}

function buildSummary(data) {
  const bar = document.getElementById('summaryBar');
  const total = data.length;
  const fiveStars = data.filter(r => r.stars === 5).length;
  const cats = {};
  data.forEach(r => { cats[r.cat] = (cats[r.cat]||0)+1; });
  const topCat = Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];

  bar.innerHTML = `
    <div class="summary-chip"><b>${total}</b>則動態</div>
    <div class="summary-chip hl"><b>${fiveStars}</b>最高重要度★★★★★</div>
    ${topCat ? `<div class="summary-chip"><b>${topCat[1]}</b>${topCat[0]}</div>` : ''}
    <div class="summary-chip"><b>${allDates().length}</b>個日期</div>
  `;
}

function render() {
  const data = getFiltered();
  buildSummary(data);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!data.length) {
    grid.innerHTML = '<div class="empty">😶 找不到符合條件的資料</div>';
    return;
  }

  const sort = document.getElementById('sortBy').value;
  const groupByDate = sort !== 'star-desc';

  if (groupByDate) {
    const groups = {};
    data.forEach(r => { (groups[r.date] = groups[r.date]||[]).push(r); });
    const sortedDates = Object.keys(groups).sort((a,b) =>
      sort === 'date-asc' ? a.localeCompare(b) : b.localeCompare(a));

    sortedDates.forEach(date => {
      const label = document.createElement('div');
      label.className = 'date-group-label';
      label.innerHTML = `<b>${date}</b><span class="count">${groups[date].length} 則</span>`;
      grid.appendChild(label);
      groups[date].forEach(r => grid.appendChild(makeCard(r)));
    });
  } else {
    data.forEach(r => grid.appendChild(makeCard(r)));
  }
}

function makeCard(r) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-top">
      <div>
        <span class="category-tag ${catClass(r.cat)}">${r.cat}</span>
        <div style="margin-top:6px" class="card-date">${r.date}</div>
      </div>
      <div class="stars" title="${r.stars} 顆星">${starsHTML(r.stars)}</div>
    </div>
    <div class="vendor-name">${r.vendor}</div>
    <div class="game-name">${r.game}</div>
    <div class="summary">${r.summary}</div>
    <div class="card-footer">
      <a class="source-link" href="${r.url}" target="_blank" rel="noopener">
        <span class="source-icon">🔗</span>${hostname(r.url)}
      </a>
    </div>
  `;
  return card;
}

function updateStats() {
  const dates = allDates();
  document.getElementById('statTotal').textContent = raw.length;
  document.getElementById('statDates').textContent = dates.length;
  document.getElementById('statLatest').textContent = dates[0] || '-';
}

// Init
buildDateNav();
updateStats();
render();

document.getElementById('search').addEventListener('input', render);
document.getElementById('catFilter').addEventListener('change', render);
document.getElementById('starFilter').addEventListener('change', render);
document.getElementById('sortBy').addEventListener('change', render);
document.querySelector('.date-btn.all').onclick = () => {
  selectedDate = 'all';
  render();
  updateDateNav();
};
document.getElementById('resetBtn').onclick = () => {
  document.getElementById('search').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('starFilter').value = '0';
  document.getElementById('sortBy').value = 'date-desc';
  selectedDate = 'all';
  updateDateNav();
  render();
};
</script>
</body>
