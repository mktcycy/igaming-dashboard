<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGaming 每日市場動態</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #e8f4fd 0%, #f0ebff 40%, #fce8f3 100%);
  min-height: 100vh;
  color: #1e2d3d;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 20px rgba(100,120,200,0.1);
  padding: 14px 24px;
}
.header-inner {
  max-width: 1500px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
.logo .ig { color: #4f46e5; }
.logo .mk { color: #0ea5e9; }
.logo .daily { color: #64748b; font-weight: 500; font-size: 0.9rem; margin-left: 6px; }

.search-wrap { flex: 1; min-width: 220px; position: relative; }
.search-wrap input {
  width: 100%; padding: 9px 16px 9px 38px;
  background: rgba(255,255,255,0.9); border: 1.5px solid rgba(148,163,184,0.4);
  border-radius: 24px; font-size: 0.9rem; color: #1e2d3d; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1rem; pointer-events: none; }

.header-right { display: flex; gap: 10px; align-items: center; }
.hdr-stat { text-align: center; background: rgba(79,70,229,0.07); border-radius: 10px; padding: 6px 14px; }
.hdr-stat b { display: block; font-size: 1.1rem; font-weight: 700; color: #4f46e5; line-height: 1; }
.hdr-stat span { font-size: 0.7rem; color: #64748b; }

/* ── LAYOUT ── */
.layout {
  max-width: 1500px; margin: 0 auto;
  display: grid; grid-template-columns: 240px 1fr;
  gap: 0; padding: 0;
  align-items: start;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky; top: 70px;
  padding: 20px 16px; height: calc(100vh - 70px);
  overflow-y: auto; scrollbar-width: thin;
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-title {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;
  padding-left: 4px;
}

/* Category buttons */
.cat-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 12px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 0.88rem; font-weight: 500; color: #475569;
  background: transparent; text-align: left; transition: all 0.15s;
  margin-bottom: 3px;
}
.cat-btn:hover { background: rgba(255,255,255,0.8); color: #1e2d3d; }
.cat-btn.active { background: rgba(255,255,255,0.95); color: #1e2d3d; font-weight: 600;
  box-shadow: 0 2px 10px rgba(100,120,200,0.12); }
.cat-btn .cat-icon { font-size: 1.1rem; width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cat-btn .cat-count { margin-left: auto; font-size: 0.72rem; background: rgba(148,163,184,0.2);
  border-radius: 20px; padding: 2px 8px; color: #64748b; }
.cat-btn.active .cat-count { background: rgba(79,70,229,0.12); color: #4f46e5; }

/* Active indicator per category */
.cat-btn[data-cat="熱門廠商"].active .cat-icon { background: #dbeafe; }
.cat-btn[data-cat="業界趨勢"].active .cat-icon { background: #dcfce7; }
.cat-btn[data-cat="菲律賓法規"].active .cat-icon { background: #fee2e2; }
.cat-btn[data-cat="全球科技應用"].active .cat-icon { background: #f3e8ff; }
.cat-btn[data-cat="業界大事"].active .cat-icon { background: #fef9c3; }

/* Date buttons */
.date-btn {
  display: block; width: 100%; padding: 7px 12px; border-radius: 8px;
  border: none; cursor: pointer; font-size: 0.83rem; color: #475569;
  background: transparent; text-align: left; transition: all 0.15s; margin-bottom: 2px;
}
.date-btn:hover { background: rgba(255,255,255,0.8); color: #1e2d3d; }
.date-btn.active { background: rgba(255,255,255,0.95); color: #4f46e5; font-weight: 600;
  box-shadow: 0 1px 6px rgba(100,120,200,0.1); }

/* Star filter */
.star-btns { display: flex; flex-direction: column; gap: 3px; }
.star-btn {
  padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.83rem; color: #475569; background: transparent;
  text-align: left; transition: all 0.15s;
}
.star-btn:hover { background: rgba(255,255,255,0.8); }
.star-btn.active { background: rgba(255,255,255,0.95); color: #b45309; font-weight: 600;
  box-shadow: 0 1px 6px rgba(100,120,200,0.1); }

/* Sort select */
.sort-select {
  width: 100%; padding: 8px 10px; border-radius: 8px;
  border: 1.5px solid rgba(148,163,184,0.3); background: rgba(255,255,255,0.8);
  font-size: 0.83rem; color: #475569; cursor: pointer; outline: none;
}
.sort-select:focus { border-color: #4f46e5; }

.reset-btn {
  width: 100%; padding: 8px; border-radius: 8px; border: 1.5px dashed rgba(148,163,184,0.5);
  background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.82rem;
  transition: all 0.15s; margin-top: 4px;
}
.reset-btn:hover { border-color: #4f46e5; color: #4f46e5; background: rgba(79,70,229,0.05); }

/* ── MAIN CONTENT ── */
.main { padding: 20px 20px 40px 4px; min-height: calc(100vh - 70px); }

/* Stats bar */
.stats-bar {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
}
.stat-chip {
  background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.9); border-radius: 10px;
  padding: 8px 16px; font-size: 0.8rem; color: #64748b;
  display: flex; align-items: center; gap: 6px;
}
.stat-chip b { color: #1e2d3d; font-size: 1rem; }
.stat-chip.hi b { color: #4f46e5; }

/* Date group header */
.date-group-header {
  grid-column: 1/-1;
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0 10px; padding-bottom: 8px;
  border-bottom: 2px solid rgba(255,255,255,0.7);
}
.date-group-header .d-label {
  font-size: 1rem; font-weight: 700; color: #1e2d3d;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
  border-radius: 8px; padding: 4px 14px; border: 1px solid rgba(255,255,255,0.95);
}
.date-group-header .d-count {
  font-size: 0.75rem; color: #64748b;
  background: rgba(255,255,255,0.6); border-radius: 20px; padding: 2px 10px;
}

/* Card grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

/* Card */
.card {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 16px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 9px;
  box-shadow: 0 2px 12px rgba(100,120,200,0.06);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  cursor: default;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(79,70,229,0.12);
  border-color: rgba(79,70,229,0.25);
  background: rgba(255,255,255,0.85);
}

.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.tag-date-wrap { display: flex; flex-direction: column; gap: 4px; }

.cat-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.7rem; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; letter-spacing: 0.3px;
}
.tag-vendor  { background: #dbeafe; color: #1d4ed8; }
.tag-trend   { background: #dcfce7; color: #15803d; }
.tag-reg     { background: #fee2e2; color: #b91c1c; }
.tag-tech    { background: #f3e8ff; color: #7e22ce; }
.tag-event   { background: #fef9c3; color: #92400e; }
.tag-default { background: #f1f5f9; color: #475569; }

.card-date { font-size: 0.73rem; color: #94a3b8; }

.stars { font-size: 0.85rem; letter-spacing: 1px; }
.s5 { color: #f59e0b; }
.s4 { color: #fbbf24; }
.s3 { color: #d97706; }
.s2 { color: #94a3b8; }
.s1 { color: #cbd5e1; }

.vendor { font-size: 0.88rem; font-weight: 700; color: #4f46e5; }
.game   { font-size: 0.92rem; font-weight: 600; color: #1e2d3d; line-height: 1.4; }
.summary { font-size: 0.82rem; color: #475569; line-height: 1.65; }

.card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
.src-link {
  font-size: 0.74rem; color: #4f46e5; text-decoration: none;
  display: flex; align-items: center; gap: 4px; overflow: hidden;
  max-width: 80%; white-space: nowrap; text-overflow: ellipsis;
  padding: 3px 8px; border-radius: 6px; background: rgba(79,70,229,0.07);
  transition: background 0.15s;
}
.src-link:hover { background: rgba(79,70,229,0.15); }

/* Empty */
.empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; grid-column: 1/-1; }
.empty-state .e-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.95rem; }

/* Mobile */
@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; padding: 12px 16px 0; }
  .sidebar-section { margin-bottom: 12px; }
  .cat-btns-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-btn { width: auto; padding: 6px 12px; }
  .cat-btn .cat-count { display: none; }
  .date-btn { display: inline-block; width: auto; margin-right: 4px; }
  .main { padding: 14px 16px 40px; }
  .header-right { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="ig">iGaming</span><span class="mk"> Market</span>
      <span class="daily">每日動態</span>
    </div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="search" placeholder="搜尋廠商、遊戲名稱、關鍵字...">
    </div>
    <div class="header-right">
      <div class="hdr-stat"><b id="statTotal">0</b><span>則動態</span></div>
      <div class="hdr-stat"><b id="statDates">0</b><span>個日期</span></div>
      <div class="hdr-stat"><b id="statLatest">-</b><span>最新更新</span></div>
    </div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-title">📂 新聞類別</div>
      <div id="catBtns">
        <button class="cat-btn active" data-cat="all">
          <span class="cat-icon">📰</span> 全部新聞
          <span class="cat-count" id="cnt-all">0</span>
        </button>
        <button class="cat-btn" data-cat="熱門廠商">
          <span class="cat-icon">🏭</span> 熱門廠商
          <span class="cat-count" id="cnt-vendor">0</span>
        </button>
        <button class="cat-btn" data-cat="業界趨勢">
          <span class="cat-icon">📈</span> 業界趨勢
          <span class="cat-count" id="cnt-trend">0</span>
        </button>
        <button class="cat-btn" data-cat="菲律賓法規">
          <span class="cat-icon">⚖️</span> 菲律賓法規
          <span class="cat-count" id="cnt-reg">0</span>
        </button>
        <button class="cat-btn" data-cat="全球科技應用">
          <span class="cat-icon">💻</span> 全球科技
          <span class="cat-count" id="cnt-tech">0</span>
        </button>
        <button class="cat-btn" data-cat="業界大事">
          <span class="cat-icon">🎪</span> 業界大事
          <span class="cat-count" id="cnt-event">0</span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">📅 反查日期</div>
      <div id="dateBtns">
        <button class="date-btn active" data-date="all">🗓 全部日期</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">⭐ 重要程度</div>
      <div class="star-btns">
        <button class="star-btn active" data-star="0">全部</button>
        <button class="star-btn" data-star="5">★★★★★ 僅最高</button>
        <button class="star-btn" data-star="4">★★★★ 以上</button>
        <button class="star-btn" data-star="3">★★★ 以上</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">🔃 排序方式</div>
      <select class="sort-select" id="sortBy">
        <option value="date-desc">日期（新 → 舊）</option>
        <option value="date-asc">日期（舊 → 新）</option>
        <option value="star-desc">重要程度（高 → 低）</option>
      </select>
      <button class="reset-btn" id="resetBtn">↺ 重置所有篩選</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="stats-bar" id="statsBar"></div>
    <div id="contentArea"></div>
  </main>
</div>

<script>
let raw = [];
// State
let selCat = 'all', selDate = 'all', selStar = 0;

function tagClass(cat) {
  if (cat.includes('廠商')) return 'tag-vendor';
  if (cat.includes('趨勢')) return 'tag-trend';
  if (cat.includes('法規') || cat.includes('菲律賓')) return 'tag-reg';
  if (cat.includes('科技')) return 'tag-tech';
  if (cat.includes('大事')) return 'tag-event';
  return 'tag-default';
}

function starsEl(n) {
  const cls = ['','s1','s2','s3','s4','s5'][n] || 's3';
  return `<span class="stars ${cls}">${'★'.repeat(n)}${'☆'.repeat(5-n)}</span>`;
}

function host(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sortBy').value;
  let data = raw.filter(r => {
    if (selDate !== 'all' && r.date !== selDate) return false;
    if (selCat !== 'all' && r.cat !== selCat) return false;
    if (r.stars < selStar) return false;
    if (q && !`${r.vendor} ${r.game} ${r.summary} ${r.cat}`.toLowerCase().includes(q)) return false;
    return true;
  });
  if (sort === 'date-asc') data.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'date-desc') data.sort((a,b) => b.date.localeCompare(a.date));
  else data.sort((a,b) => b.stars - a.stars || b.date.localeCompare(a.date));
  return data;
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = raw.length;
  const cats = { '熱門廠商':'cnt-vendor','業界趨勢':'cnt-trend','菲律賓法規':'cnt-reg','全球科技應用':'cnt-tech','業界大事':'cnt-event' };
  for (const [cat, id] of Object.entries(cats)) {
    document.getElementById(id).textContent = raw.filter(r => r.cat === cat).length;
  }
}

function buildDateBtns() {
  const wrap = document.getElementById('dateBtns');
  const dates = [...new Set(raw.map(r => r.date))].sort().reverse();
  dates.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-btn';
    btn.dataset.date = d;
    btn.textContent = '📅 ' + d;
    wrap.appendChild(btn);
  });
}

function render() {
  const data = getFiltered();
  const sort = document.getElementById('sortBy').value;

  // Stats bar
  const fiveS = data.filter(r => r.stars === 5).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><b>${data.length}</b> 則動態</div>
    <div class="stat-chip hi"><b>${fiveS}</b> 最高重要度</div>
    <div class="stat-chip"><b>${selDate === 'all' ? '全部日期' : selDate}</b> 日期篩選</div>
    <div class="stat-chip"><b>${selCat === 'all' ? '全類別' : selCat}</b> 類別篩選</div>
  `;

  const area = document.getElementById('contentArea');
  area.innerHTML = '';

  if (!data.length) {
    area.innerHTML = '<div class="empty-state"><div class="e-icon">🔍</div><p>找不到符合條件的資料，請調整篩選條件</p></div>';
    return;
  }

  const groupByDate = sort !== 'star-desc';
  const grid = document.createElement('div');
  grid.className = 'grid';

  if (groupByDate) {
    const groups = {};
    data.forEach(r => { (groups[r.date] = groups[r.date]||[]).push(r); });
    const sortedDates = Object.keys(groups).sort((a,b) => sort === 'date-asc' ? a.localeCompare(b) : b.localeCompare(a));
    sortedDates.forEach(date => {
      const hdr = document.createElement('div');
      hdr.className = 'date-group-header';
      hdr.innerHTML = `<div class="d-label">📅 ${date}</div><div class="d-count">${groups[date].length} 則</div>`;
      grid.appendChild(hdr);
      groups[date].forEach(r => grid.appendChild(makeCard(r)));
    });
  } else {
    data.forEach(r => grid.appendChild(makeCard(r)));
  }

  area.appendChild(grid);
}

function makeCard(r) {
  const c = document.createElement('div');
  c.className = 'card';
  c.innerHTML = `
    <div class="card-top">
      <div class="tag-date-wrap">
        <span class="cat-tag ${tagClass(r.cat)}">${r.cat}</span>
        <span class="card-date">${r.date}</span>
      </div>
      ${starsEl(r.stars)}
    </div>
    <div class="vendor">${r.vendor}</div>
    <div class="game">${r.game}</div>
    <div class="summary">${r.summary}</div>
    <div class="card-foot">
      <a class="src-link" href="${r.url}" target="_blank" rel="noopener">🔗 ${host(r.url)}</a>
    </div>
  `;
  return c;
}

function updateStats() {
  const dates = [...new Set(raw.map(r => r.date))].sort().reverse();
  document.getElementById('statTotal').textContent = raw.length;
  document.getElementById('statDates').textContent = dates.length;
  document.getElementById('statLatest').textContent = dates[0] || '-';
}

// Event wiring
document.getElementById('search').addEventListener('input', render);
document.getElementById('sortBy').addEventListener('change', render);

document.getElementById('catBtns').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  selCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === selCat));
  render();
});

document.getElementById('dateBtns').addEventListener('click', e => {
  const btn = e.target.closest('.date-btn');
  if (!btn) return;
  selDate = btn.dataset.date;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.toggle('active', b.dataset.date === selDate));
  render();
});

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selStar = parseInt(btn.dataset.star);
    document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', b.dataset.star === btn.dataset.star));
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  selCat = 'all'; selDate = 'all'; selStar = 0;
  document.getElementById('search').value = '';
  document.getElementById('sortBy').value = 'date-desc';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  document.querySelectorAll('.date-btn').forEach(b => b.classList.toggle('active', b.dataset.date === 'all'));
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('active', b.dataset.star === '0'));
  render();
});

// Init
fetch('data.json')
  .then(r => r.json())
  .then(data => { raw = data; buildDateBtns(); updateCounts(); updateStats(); render(); })
  .catch(() => {
    document.getElementById('contentArea').innerHTML =
      '<div class="empty-state"><div class="e-icon">⚠️</div><p>資料載入失敗，請重新整理頁面</p></div>';
  });
</script>
</body>
</html>
